# Avellaneda-Stoikov MM on yex:US3M with anomaly protection + markout tracking
strategy: avellaneda_mm
instrument: US3M-USDYP
tick_interval: 10.0
dry_run: false
max_ticks: 0
data_dir: data/yex-us3m
log_level: INFO

# Strategy params (conservative for testnet validation)
strategy_params:
  gamma: 0.1
  k: 1.5
  base_size: 100.0        # US3M trades in 100-lot increments on testnet
  max_inventory: 1000.0
  min_spread_bps: 3.0     # US3M typical spread
  max_spread_bps: 100.0
  vol_window: 30

# Risk limits (conservative)
max_position_qty: 1000.0
max_notional_usd: 5000.0
max_order_size: 200.0
max_daily_drawdown_pct: 5.0
max_leverage: 3.0
tvl: 10000.0

# Anomaly protection
protection:
  enabled: true
  config_path: /Users/jae_lee/anomaly-protection/configs/protection_us3m.yaml
