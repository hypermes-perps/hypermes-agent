# Avellaneda-Stoikov MM on yex:VXX with anomaly protection + markout tracking
strategy: avellaneda_mm
instrument: VXX-USDYP
tick_interval: 10.0
dry_run: false
max_ticks: 0
data_dir: data/yex-vxx
log_level: INFO

# Strategy params
strategy_params:
  gamma: 0.1
  k: 1.5
  base_size: 10.0         # VXX trades in smaller lots
  max_inventory: 100.0
  min_spread_bps: 10.0    # VXX has wider spreads
  max_spread_bps: 200.0
  vol_window: 30

# Risk limits (conservative)
max_position_qty: 100.0
max_notional_usd: 5000.0
max_order_size: 20.0
max_daily_drawdown_pct: 5.0
max_leverage: 3.0
tvl: 10000.0

# Anomaly protection
protection:
  enabled: true
  config_path: configs/protection_vxx.yaml
