market_name: funding_rate
instrument: FR-PERP
tick_size: 0.0001
round_duration_s: 20.0

fv_weights:
  w_oracle: 0.50
  w_external: 0.10
  w_microprice: 0.40
  w_inventory: 0.00  # inventory adjustment via InventorySkewer.price_skew(), not FV blend

spread:
  h_fee_bps: 1.5
  vol_scale: 1.5
  rebate_credit_bps: 0.2
  min_spread_bps: 5.0
  max_spread_bps: 40.0

ladder:
  num_levels: 3
  delta_bps: 1.0
  s0: 0.5
  lam: 0.5
  min_size_ratio: 0.1

skew:
  k_inv: 0.3
  inv_limit: 5.0
  mode: both
  size_skew_factor: 0.3
  soft_cap: 4.0
  hard_cap: 6.0
  micro_clip_size: 0.2
  micro_clip_interval: 5

vol_window: 30
funding_dampening: 0  # pass-through: funding IS the product

fv_band:
  enabled: true
  band_min_bps: 2.0
  k_sigma: 2.0
  k_disagree: 0.3

disagreement:
  enabled: true
  threshold_bps: 10.0
  spread_mult: 1.5
  size_mult: 0.7

funding_boundary:
  enabled: true
  pre_window_s: 30
  post_window_s: 30
  size_mult: 0.3
  pin_fv_to_oracle: true

liquidation_detector:
  enabled: true
  oi_drop_threshold_pct: 5.0
  spread_mult: 2.0
  size_mult: 0.5
  cooldown_ticks: 10
  mid_burst_bps: 50.0
  mid_burst_window: 3
  liq_catcher_levels: 1
  liq_catcher_size_mult: 0.3
  escalation_ticks: 7

feeds:
  oracle_monitor:
    warning_ms: 5000
    stale_ms: 15000
    kill_ms: 60000
    enabled: true
  event_calendar_path: ""
  microprice_depth: 5
